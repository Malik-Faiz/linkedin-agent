<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Agent — Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#0f0f18;--surface2:#16161f;--surface3:#1e1e2a;
  --border:#252535;--border2:#303045;
  --accent:#7c6aff;--accent2:#ff6b9d;--accent3:#00d4aa;
  --green:#00e5a0;--red:#ff5f5f;--amber:#ffb347;
  --text:#eeeeff;--muted:#6868a0;--muted2:#4a4a70;
  --font:'Syne',sans-serif;--mono:'Space Mono',monospace
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:0;opacity:.5}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,255,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

.card{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border2);border-radius:24px;
  padding:44px 40px 40px;width:100%;max-width:460px;margin:24px;
  animation:slideUp .4s ease
}
.card::before{content:'';position:absolute;top:-100px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(124,106,255,.1),transparent 65%);pointer-events:none;border-radius:50%}
.card::after{content:'';position:absolute;bottom:-80px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(0,212,170,.06),transparent 65%);pointer-events:none;border-radius:50%}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}

.logo-wrap{display:flex;justify-content:center;margin-bottom:24px}
.logo{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;letter-spacing:-1px;position:relative}
.logo-glow{position:absolute;inset:-8px;border-radius:24px;background:radial-gradient(circle,rgba(124,106,255,.35),transparent 70%);z-index:-1;animation:glow 3s ease-in-out infinite}

.title{text-align:center;font-size:24px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.subtitle{text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:28px}

/* steps progress bar */
.steps{display:flex;gap:6px;margin-bottom:28px}
.step{flex:1;height:3px;border-radius:2px;background:var(--surface3);transition:background .3s}
.step.done{background:var(--accent)}
.step.active{background:linear-gradient(90deg,var(--accent),var(--accent2))}

.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field-wrap{position:relative}
.field-wrap i.ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:16px;pointer-events:none}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:13px 14px 13px 42px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border .2s,background .2s}
.field input:focus{border-color:var(--accent);background:var(--surface3)}
.field input.err{border-color:var(--red)!important}
.field input.ok{border-color:var(--green)!important}

.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted2);cursor:pointer;font-size:16px;padding:4px;transition:color .15s}
.pw-toggle:hover{color:var(--muted)}

/* password strength */
.pw-strength{margin-top:8px}
.strength-bar{height:3px;border-radius:2px;background:var(--surface3);overflow:hidden;margin-bottom:4px}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:10px;font-family:var(--mono);color:var(--muted2);transition:color .3s}

/* username check */
.field-hint{font-size:10px;font-family:var(--mono);margin-top:5px;min-height:14px;transition:color .2s}
.hint-ok{color:var(--green)}
.hint-err{color:var(--red)}
.hint-info{color:var(--muted)}

/* error box */
.err-box{display:none;align-items:center;gap:8px;background:rgba(255,95,95,.08);border:1px solid rgba(255,95,95,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);font-family:var(--mono);margin-bottom:16px}
.err-box.show{display:flex}

/* button */
.btn{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;transition:opacity .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn .spin-icon{animation:spin .7s linear infinite}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted2);font-size:11px;font-family:var(--mono)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}

.login-link{text-align:center;font-size:13px;color:var(--muted)}
.login-link a{color:var(--accent);text-decoration:none;font-weight:700;transition:opacity .15s}
.login-link a:hover{opacity:.75}

.note{text-align:center;font-size:11px;color:var(--muted2);font-family:var(--mono);margin-top:20px;line-height:1.7}
.note span{color:var(--muted)}

/* tz display */
.tz-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(124,106,255,.08);border:1px solid rgba(124,106,255,.18);border-radius:20px;padding:5px 12px;font-size:11px;font-family:var(--mono);color:var(--accent);margin-bottom:20px;width:100%;justify-content:center}

/* terms checkbox */
.terms{display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;cursor:pointer;user-select:none}
.terms input[type=checkbox]{display:none}
.cb-box{width:18px;height:18px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-top:1px}
.terms input:checked+.cb-box{background:var(--accent);border-color:var(--accent)}
.terms input:checked+.cb-box::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.terms span{font-size:12px;color:var(--muted);font-family:var(--mono);line-height:1.5}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo">Li<div class="logo-glow"></div></div>
  </div>

  <h1 class="title">Create account</h1>
  <p class="subtitle">Join LinkedIn Agent — start automating</p>

  <div class="steps">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>

  <div class="tz-chip">
    <i class="ti ti-world" style="font-size:13px"></i>
    <span id="tzDisplay">Detecting timezone…</span>
  </div>

  <div class="err-box" id="errBox">
    <i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0"></i>
    <span id="errMsg"></span>
  </div>

  <div class="field">
    <label for="username">Username</label>
    <div class="field-wrap">
      <i class="ti ti-user ic"></i>
      <input type="text" id="username" placeholder="only letters, numbers, _"
             autocomplete="username" oninput="checkUsername()" onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <div class="field-hint hint-info" id="userHint">Min 3 chars · letters, numbers, underscore only</div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="field-wrap">
      <i class="ti ti-lock ic"></i>
      <input type="password" id="password" placeholder="min 6 characters"
             autocomplete="new-password" oninput="checkStrength()" onkeydown="if(event.key==='Enter')doRegister()">
      <button class="pw-toggle" type="button" onclick="togglePw('password','pwIcon1')" title="Show password">
        <i class="ti ti-eye" id="pwIcon1"></i>
      </button>
    </div>
    <div class="pw-strength">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel">Enter a password</div>
    </div>
  </div>

  <div class="field">
    <label for="confirm">Confirm Password</label>
    <div class="field-wrap">
      <i class="ti ti-lock-check ic"></i>
      <input type="password" id="confirm" placeholder="••••••••"
             autocomplete="new-password" oninput="checkMatch()" onkeydown="if(event.key==='Enter')doRegister()">
      <button class="pw-toggle" type="button" onclick="togglePw('confirm','pwIcon2')" title="Show password">
        <i class="ti ti-eye" id="pwIcon2"></i>
      </button>
    </div>
    <div class="field-hint" id="matchHint"></div>
  </div>

  <label class="terms">
    <input type="checkbox" id="agreeTerms">
    <div class="cb-box"></div>
    <span>I understand this app stores API keys securely per account and schedules LinkedIn posts automatically.</span>
  </label>

  <button class="btn" id="regBtn" onclick="doRegister()">
    <i class="ti ti-user-plus"></i>
    <span id="btnLabel">Create Account</span>
  </button>

  <div class="divider">already have an account?</div>

  <div class="login-link">
    <a href="/login">← Sign in instead</a>
  </div>

  <p class="note"><span>Your keys are encrypted &amp; stored privately.</span><br>Session lasts 24 hours · timezone auto-detected.</p>
</div>

<script>
const API         = window.location.origin + '/api';
const SESSION_KEY = 'li_session';
const SESSION_MS  = 24 * 60 * 60 * 1000;

function getUTCOffset(){ return -(new Date().getTimezoneOffset()/60); }
function formatOffset(h){
  if(h===null||h===undefined) return 'UTC';
  const s=h>=0?'+':'-',a=Math.abs(h),hh=Math.floor(a),mm=Math.round((a-hh)*60);
  return mm>0?`UTC${s}${hh}:${String(mm).padStart(2,'0')}`:`UTC${s}${hh}`;
}
function getLocalTZName(){ try{return Intl.DateTimeFormat().resolvedOptions().timeZone;}catch{return '';} }
function setSession(u){ localStorage.setItem(SESSION_KEY,JSON.stringify({username:u,loginAt:Date.now(),expiresAt:Date.now()+SESSION_MS})); }

/* show timezone */
(function(){
  const tz=getLocalTZName(), off=formatOffset(getUTCOffset());
  document.getElementById('tzDisplay').textContent = tz ? `${tz} (${off})` : off;
})();

/* progress steps */
function updateSteps(done){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('s'+i);
    el.className='step'+(i<done?' done':i===done?' active':'');
  });
}

/* username validation */
function checkUsername(){
  const v=document.getElementById('username').value.trim();
  const hint=document.getElementById('userHint');
  const inp=document.getElementById('username');
  if(!v){ hint.textContent='Min 3 chars · letters, numbers, underscore only'; hint.className='field-hint hint-info'; inp.classList.remove('ok','err'); return false; }
  if(v.length<3){ hint.textContent='Too short — at least 3 characters'; hint.className='field-hint hint-err'; inp.classList.add('err'); inp.classList.remove('ok'); return false; }
  if(!/^[a-z0-9_]+$/.test(v)){ hint.textContent='Only lowercase letters, numbers, and _ allowed'; hint.className='field-hint hint-err'; inp.classList.add('err'); inp.classList.remove('ok'); return false; }
  hint.textContent='✓ Looks good'; hint.className='field-hint hint-ok'; inp.classList.add('ok'); inp.classList.remove('err');
  updateSteps(2); return true;
}

/* password strength */
function checkStrength(){
  const p=document.getElementById('password').value;
  const fill=document.getElementById('strengthFill');
  const lbl=document.getElementById('strengthLabel');
  const inp=document.getElementById('password');
  if(!p){ fill.style.width='0'; fill.style.background=''; lbl.textContent='Enter a password'; lbl.style.color=''; inp.classList.remove('ok','err'); return; }
  let score=0;
  if(p.length>=6) score++;
  if(p.length>=10) score++;
  if(/[A-Z]/.test(p)) score++;
  if(/[0-9]/.test(p)) score++;
  if(/[^A-Za-z0-9]/.test(p)) score++;
  const levels=[
    {w:'20%',bg:'var(--red)',t:'Too weak'},
    {w:'40%',bg:'var(--red)',t:'Weak'},
    {w:'60%',bg:'var(--amber)',t:'Fair'},
    {w:'80%',bg:'var(--accent)',t:'Good'},
    {w:'100%',bg:'var(--green)',t:'Strong 💪'}
  ];
  const l=levels[Math.min(score,4)];
  fill.style.width=l.w; fill.style.background=l.bg; lbl.textContent=l.t; lbl.style.color=l.bg;
  if(score>=2){ inp.classList.remove('err'); } else { inp.classList.add('err'); }
  if(score>=3) updateSteps(3);
  checkMatch();
}

/* confirm match */
function checkMatch(){
  const p=document.getElementById('password').value;
  const c=document.getElementById('confirm').value;
  const hint=document.getElementById('matchHint');
  const inp=document.getElementById('confirm');
  if(!c){ hint.textContent=''; inp.classList.remove('ok','err'); return false; }
  if(p===c){ hint.textContent='✓ Passwords match'; hint.className='field-hint hint-ok'; inp.classList.add('ok'); inp.classList.remove('err'); return true; }
  hint.textContent='✗ Passwords do not match'; hint.className='field-hint hint-err'; inp.classList.add('err'); inp.classList.remove('ok'); return false;
}

function togglePw(id,iconId){
  const inp=document.getElementById(id);
  const icon=document.getElementById(iconId);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  icon.className=show?'ti ti-eye-off':'ti ti-eye';
}

function showErr(msg){
  document.getElementById('errMsg').textContent=msg;
  document.getElementById('errBox').classList.add('show');
}
function clearErr(){ document.getElementById('errBox').classList.remove('show'); }

async function doRegister(){
  clearErr();
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const c=document.getElementById('confirm').value;
  const btn=document.getElementById('regBtn');
  const lbl=document.getElementById('btnLabel');

  if(!u||!p||!c){ showErr('Please fill in all fields.'); return; }
  if(!checkUsername()){ showErr('Invalid username format.'); return; }
  if(p.length<6){ showErr('Password must be at least 6 characters.'); return; }
  if(p!==c){ showErr('Passwords do not match.'); return; }
  if(!document.getElementById('agreeTerms').checked){ showErr('Please accept the terms to continue.'); return; }

  btn.disabled=true; lbl.textContent='Creating account…';
  btn.querySelector('i').className='ti ti-loader-2 spin-icon';

  try{
    const res=await fetch(`${API}/register`,{
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u,password:p,utc_offset_hours:getUTCOffset()})
    });
    const data=await res.json();
    if(data.ok){
      localStorage.setItem(SESSION_KEY,JSON.stringify({username:data.username,loginAt:Date.now(),expiresAt:Date.now()+SESSION_MS}));
      window.location.href='/api-setup';
    } else {
      showErr(data.message||'Registration failed.');
      btn.disabled=false; lbl.textContent='Create Account';
      btn.querySelector('i').className='ti ti-user-plus';
    }
  } catch(e){
    showErr('Cannot reach server. Make sure python app.py is running.');
    btn.disabled=false; lbl.textContent='Create Account';
    btn.querySelector('i').className='ti ti-user-plus';
  }
}
</script>
</body>
</html>
