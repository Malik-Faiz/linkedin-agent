<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Agent — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#0f0f18;--surface2:#16161f;--surface3:#1e1e2a;
  --border:#252535;--border2:#303045;
  --accent:#7c6aff;--accent2:#ff6b9d;
  --green:#00e5a0;--red:#ff5f5f;
  --text:#eeeeff;--muted:#6868a0;--muted2:#4a4a70;
  --font:'Syne',sans-serif;--mono:'Space Mono',monospace
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);display:flex;align-items:center;justify-content:center;overflow-x:hidden}

/* noise + grid overlays */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;pointer-events:none;z-index:0;opacity:.5}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,255,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

.card{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border2);border-radius:24px;
  padding:48px 40px 40px;width:100%;max-width:440px;margin:24px;
  animation:slideUp .4s ease
}
.card::before{content:'';position:absolute;top:-100px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(124,106,255,.1),transparent 65%);pointer-events:none;border-radius:50%}
.card::after{content:'';position:absolute;bottom:-80px;left:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,107,157,.07),transparent 65%);pointer-events:none;border-radius:50%}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* logo */
.logo-wrap{display:flex;justify-content:center;margin-bottom:28px}
.logo{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;letter-spacing:-1px;position:relative}
.logo-glow{position:absolute;inset:-8px;border-radius:26px;background:radial-gradient(circle,rgba(124,106,255,.35),transparent 70%);z-index:-1;animation:glow 3s ease-in-out infinite}

.title{text-align:center;font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.subtitle{text-align:center;font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:36px;line-height:1.6}
.subtitle span{color:var(--accent)}

/* field */
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-family:var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.field-wrap{position:relative}
.field-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:16px;pointer-events:none}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:13px 14px 13px 42px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border .2s,background .2s}
.field input:focus{border-color:var(--accent);background:var(--surface3)}
.field input.err{border-color:var(--red)!important}

/* password toggle */
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted2);cursor:pointer;font-size:16px;padding:4px;transition:color .15s}
.pw-toggle:hover{color:var(--muted)}

/* error */
.err-box{display:none;align-items:center;gap:8px;background:rgba(255,95,95,.08);border:1px solid rgba(255,95,95,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--red);font-family:var(--mono);margin-bottom:18px}
.err-box.show{display:flex}

/* submit */
.btn{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;transition:opacity .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn .spin-icon{animation:spin .7s linear infinite}

/* divider */
.divider{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--muted2);font-size:11px;font-family:var(--mono)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}

/* register link */
.reg-link{text-align:center;font-size:13px;color:var(--muted)}
.reg-link a{color:var(--accent);text-decoration:none;font-weight:700;transition:opacity .15s}
.reg-link a:hover{opacity:.75}

.note{text-align:center;font-size:11px;color:var(--muted2);font-family:var(--mono);margin-top:22px;line-height:1.7}
.note span{color:var(--muted)}

/* remember me */
.remember{display:flex;align-items:center;gap:10px;margin-bottom:20px;cursor:pointer;user-select:none}
.remember input[type=checkbox]{display:none}
.cb-box{width:18px;height:18px;border-radius:5px;border:1px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.remember input:checked+.cb-box{background:var(--accent);border-color:var(--accent)}
.remember input:checked+.cb-box::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.remember span{font-size:13px;color:var(--muted);font-family:var(--mono)}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo">Li<div class="logo-glow"></div></div>
  </div>

  <h1 class="title">Welcome back</h1>
  <p class="subtitle">Sign in to <span>LinkedIn Agent</span><br>auto-scheduler &amp; post manager</p>

  <div class="err-box" id="errBox">
    <i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0"></i>
    <span id="errMsg"></span>
  </div>

  <div class="field">
    <label for="username">Username</label>
    <div class="field-wrap">
      <i class="ti ti-user"></i>
      <input type="text" id="username" placeholder="your_username" autocomplete="username"
             onkeydown="if(event.key==='Enter')doLogin()">
    </div>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <div class="field-wrap">
      <i class="ti ti-lock"></i>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" type="button" onclick="togglePw()" title="Show/hide password">
        <i class="ti ti-eye" id="pwIcon"></i>
      </button>
    </div>
  </div>

  <label class="remember">
    <input type="checkbox" id="rememberMe">
    <div class="cb-box"></div>
    <span>Remember me for 24 hours</span>
  </label>

  <button class="btn" id="loginBtn" onclick="doLogin()">
    <i class="ti ti-login"></i>
    <span id="btnLabel">Sign In</span>
  </button>

  <div class="divider">or</div>

  <div class="reg-link">
    Don't have an account? <a href="register.html">Create one →</a>
  </div>

  <p class="note"><span>Session expires after 24 hours</span> · timezone auto-detected</p>
</div>

<script>
const API         = window.location.origin + '/api';
const SESSION_KEY = 'li_session';
const SESSION_MS  = 24 * 60 * 60 * 1000;

function getUTCOffset(){ return -(new Date().getTimezoneOffset()/60); }
function setSession(u){ localStorage.setItem(SESSION_KEY,JSON.stringify({username:u,loginAt:Date.now(),expiresAt:Date.now()+SESSION_MS})); }
function isSessionValid(){ try{const s=JSON.parse(localStorage.getItem(SESSION_KEY));return s&&Date.now()<s.expiresAt;}catch{return false;} }

function showErr(msg){
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('errBox').classList.add('show');
  document.getElementById('username').classList.add('err');
  document.getElementById('password').classList.add('err');
}
function clearErr(){
  document.getElementById('errBox').classList.remove('show');
  document.getElementById('username').classList.remove('err');
  document.getElementById('password').classList.remove('err');
}

function togglePw(){
  const inp  = document.getElementById('password');
  const icon = document.getElementById('pwIcon');
  const show = inp.type === 'password';
  inp.type   = show ? 'text' : 'password';
  icon.className = show ? 'ti ti-eye-off' : 'ti ti-eye';
}

async function doLogin(){
  clearErr();
  const u   = document.getElementById('username').value.trim();
  const p   = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const lbl = document.getElementById('btnLabel');

  if(!u||!p){ showErr('Please fill in all fields.'); return; }

  btn.disabled = true;
  lbl.textContent = 'Signing in…';
  btn.querySelector('i').className = 'ti ti-loader-2 spin-icon';

  try{
    const res  = await fetch(`${API}/login`,{
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u, password:p, utc_offset_hours:getUTCOffset()})
    });
    const data = await res.json();
    if(data.ok){
      setSession(data.username);
      window.location.href = data.has_config ? 'dashboard.html' : 'api.html';
    } else {
      showErr(data.message||'Invalid username or password.');
      btn.disabled=false; lbl.textContent='Sign In';
      btn.querySelector('i').className='ti ti-login';
    }
  } catch(e){
    showErr('Cannot reach server. Make sure python app.py is running.');
    btn.disabled=false; lbl.textContent='Sign In';
    btn.querySelector('i').className='ti ti-login';
  }
}

/* auto-redirect if already logged in */
(async function(){
  if(!isSessionValid()) return;
  try{
    const res  = await fetch(`${API}/me`,{credentials:'include'});
    const data = await res.json();
    if(data.authenticated) window.location.href = data.has_config ? 'dashboard.html' : 'api.html';
  } catch(e){}
})();
</script>
</body>
</html>
